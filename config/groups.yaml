# Groups Configuration
# Defines logical groups of stages that are executed together
# Groups are executed in the order they appear in this file

groups:
  initial_preparation:
    name: "Initial Preparation"
    description: "Basic system setup and database deployments before marker creation"
    auto_execute: true  # Executed automatically before marker
    stages:
      - name: setup_hosts
        function: setup_hosts_task
        module: tasks.setup_hosts
        description: "Configure /etc/hosts, SSHD, and root password on all machines"
        
      - name: preparation_for_services_deployment
        function: preparation_for_services_deployment_task
        module: tasks.preparation_for_services_deployment
        description: "Update system packages and download supporting files"

  other_praparations:
    name: "Other general tasks, standard database installation"
    description: "Bootcamp machines preparation"
    auto_execute: false
    stages:      
      - name: deploy_mysql_on_raptor
        function: deploy_mysql_on_raptor_task
        module: tasks.deploy_mysql
        description: "Deploy MySQL on raptor"
      
      - name: deploy_mongo_on_raptor
        function: deploy_mongo_on_raptor_task
        module: tasks.deploy_mongo
        description: "Deploy MongoDB on raptor"
      
      - name: deploy_oracle_on_sauropod
        function: deploy_oracle_on_sauropod
        module: tasks.deploy_oracle
        description: "Deploy Oracle 21c on sauropod"

  atap_lab:
    name: "ATAP Lab"
    description: "PostgreSQL deployment for ATAP training"
    auto_execute: false  # Executed after marker, on demand
    stages:
      - name: deploy_postgres_on_raptor
        function: deploy_postgres_on_raptor
        module: tasks.deploy_postgres
        description: "Deploy PostgreSQL 16 on raptor"

  setup_appliances:
    name: "Setup Appliances"
    description: "Configure Guardium appliances (collector, CM, etc.)"
    auto_execute: false  # Executed on demand
    stages:     
      - name: create_oauth_client
        function: create_oauth_client
        module: tasks.setup_appliances
        description: "Create OAuth client and save client_secret to .client_secret file"
        args:
          appliance_name: "cm02"
          client_id: "BOOTCAMP"
           
      - name: create_demo_user
        function: create_demo_user
        module: tasks.setup_appliances
        description: "Create demo user in Guardium via REST API"
        args:
          appliance_name: "cm02"  # Name from config/appliances.yaml
          
      - name: configure_system_settings_all
        function: configure_system_settings_all
        module: tasks.setup_appliances
        description: "Configure hostname, domain, small_disk, and session timeouts on ALL appliances in parallel (max 20 parallel, CM → Collectors → AppNodes order)"
        args:
          # hostname: "custom"  # Optional - override hostname for all appliances
          # domain: "demo.guardium"  # Optional - defaults to demo.guardium
          debug: false
      
      - name: configure_network_ip_on_all_appliances
        function: configure_network_ip_all
        module: tasks.setup_appliances
        description: "Configure network IP addresses on ALL appliances using IPs from appliances.yaml (CM → Collectors → AppNodes)"
        args:
          # prefix: "/24"  # Optional - network prefix (default: /24)
          debug: false
      
      - name: set_timezone_on_appliances
        function: set_timezone_all
        module: tasks.setup_appliances
        description: "Set timezone on ALL appliances in parallel (max 20 parallel, defaults to Europe/Warsaw or from machines_info.json)"
        args:
          timezone: "Europe/London"  # Optional - defaults to Europe/Warsaw or from machines_info.json
          debug: false
      
      - name: configure_ntp_on_all_appliances
        function: configure_ntp_all
        module: tasks.setup_appliances
        description: "Configure NTP servers and enable time synchronization on ALL appliances in parallel (max 20 parallel, CM → Collectors → AppNodes order)"
        args:
          # ntp_servers: ['time.google.com', 'time.cloudflare.com']  # Optional - defaults to pool.ntp.org
          debug: false
      
      - name: configure_hosts_resolving_on_all_appliances
        function: configure_hosts_resolving_all
        module: tasks.setup_appliances
        description: "Configure /etc/hosts resolving on ALL appliances in parallel (max 20 parallel) for Unix machines and other Guardium appliances"
        args:
          debug: false

      - name: restart_all_appliances_after_initial_setup
        function: restart_appliance_all
        module: tasks.setup_appliances
        description: "Restart ALL appliances after initial setup (async with max 20 parallel)"
        args:
          debug: false
          wait_for_availability: true
          retry_interval: 15  # Seconds between retry attempts (default: 10)
          max_retries: 40  # Maximum retry attempts (default: 60, total timeout = 40 * 15 = 600s = 10min)

      - name: set_unit_type_manager
        function: set_unit_type_manager
        module: tasks.setup_appliances
        description: "Set unit type to manager via CLI"
        args:
          appliance_name: "cm02"
          debug: false

      - name: set_shared_secret_on_all_appliances
        function: set_shared_secret_all
        module: tasks.setup_appliances
        description: "Set shared secret on ALL appliances (CM → Collectors → AppNodes). Required before registration."
        args:
          # shared_secret: "guardium"  # Optional - defaults to value from machines_info.json custom_variables
          debug: false
      
      - name: set_product_gid_on_all_appliances
        function: set_product_gid_all
        module: tasks.setup_appliances
        description: "Set random product GID on ALL appliances in parallel (max 20 parallel, each gets unique GID 1000-100000)"
        args:
          debug: false
      
      - name: register_appliances_on_cm
        function: register_appliances_all
        module: tasks.setup_appliances
        description: "Register all Collectors and AppNodes on Central Manager sequentially (one by one, 10 min timeout per appliance)"
        args:
          # cm_ip: "10.240.64.9"  # Optional - auto-detected from appliances.yaml
          cm_port: 8443
          timeout: 900  # 15 minutes per appliance
          registration_check_delay: 120  # Seconds to wait before checking status after timeout or "Fail:" (default: 120)
          debug: true

      - name: restart_all_appliances_after_managed_by_cm
        function: restart_appliance_all
        module: tasks.setup_appliances
        description: "Restart ALL appliances after initial setup (async with max 20 parallel)"
        args:
          debug: false
          wait_for_availability: true
          retry_interval: 15  # Seconds between retry attempts (default: 10)
          max_retries: 40  # Maximum retry attempts (default: 60, total timeout = 40 * 15 = 600s = 10min)

      # - name: current_test
      #   function: current_test
      #   module: tasks.current_test
      #   description: "TEST: Disable default accounts only (diagnostic)"
      #   args:
      #     appliance_name: "cm01"

