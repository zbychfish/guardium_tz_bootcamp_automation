# Groups Configuration
# Defines logical groups of stages that are executed together
# Groups are executed in the order they appear in this file

groups:
  initial_preparation:
    name: "Initial Preparation"
    description: "Basic system setup and database deployments before marker creation"
    auto_execute: true  # Executed automatically before marker
    stages:
      - name: setup_hosts
        function: setup_hosts_task
        module: tasks.setup_hosts
        description: "Configure /etc/hosts, SSHD, and root password on all machines"
        
      - name: preparation_for_services_deployment
        function: preparation_for_services_deployment_task
        module: tasks.preparation_for_services_deployment
        description: "Update system packages and download supporting files"

  other_praparations:
    name: "Other general tasks, standard database installation"
    description: "Bootcamp machines preparation"
    auto_execute: false
    stages:      
      - name: deploy_mysql_on_raptor
        function: deploy_mysql_on_raptor_task
        module: tasks.deploy_mysql
        description: "Deploy MySQL on raptor"
      
      - name: deploy_mongo_on_raptor
        function: deploy_mongo_on_raptor_task
        module: tasks.deploy_mongo
        description: "Deploy MongoDB on raptor"
      
      - name: deploy_oracle_on_sauropod
        function: deploy_oracle_on_sauropod
        module: tasks.deploy_oracle
        description: "Deploy Oracle 21c on sauropod"

  atap_lab:
    name: "ATAP Lab"
    description: "PostgreSQL deployment for ATAP training"
    auto_execute: false  # Executed after marker, on demand
    stages:
      - name: deploy_postgres_on_raptor
        function: deploy_postgres_on_raptor
        module: tasks.deploy_postgres
        description: "Deploy PostgreSQL 16 on raptor"

  setup_appliances:
    name: "Setup Appliances"
    description: "Configure Guardium appliances (collector, CM, etc.)"
    auto_execute: false  # Executed on demand
    stages:
      # - name: test_appliance_connection
      #   function: connect_and_show_clock
      #   module: tasks.setup_appliances
      #   description: "Test appliance connectivity and show system clock"
      #   args:
      #     appliance_name: "cm01"  # Name from config/appliances.yaml
      # prompt_regex: "cm01>"  # Optional - comment out to use default from appliances.yaml
      
      - name: create_oauth_client
        function: create_oauth_client
        module: tasks.setup_appliances
        description: "Create OAuth client and save client_secret to .client_secret file"
        args:
          appliance_name: "cm01"
          client_id: "BOOTCAMP"
      
      - name: current_test
        function: current_test
        module: tasks.current_test
        description: "TEST: Disable default accounts only (diagnostic)"
        args:
          appliance_name: "cm01"
      
      - name: create_demo_user
        function: create_demo_user
        module: tasks.setup_appliances
        description: "Create demo user in Guardium via REST API"
        args:
          appliance_name: "cm01"  # Name from config/appliances.yaml
      
      - name: set_unit_type_manager
        function: set_unit_type_manager
        module: tasks.setup_appliances
        description: "Set unit type to manager via CLI"
        args:
          appliance_name: "cm01"
          debug: false
      
      - name: set_timezone_on_cm
        function: set_timezone
        module: tasks.setup_appliances
        description: "Set timezone on CM appliance (defaults to Europe/Warsaw or from machines_info.json)"
        args:
          appliance_name: "cm01"
          # timezone: "America/New_York"  # Optional - defaults to Europe/Warsaw or from machines_info.json
          debug: true
      
      - name: configure_hosts_resolving_on_cm
        function: configure_hosts_resolving
        module: tasks.setup_appliances
        description: "Configure /etc/hosts resolving for all machines from machines_info.json"
        args:
          appliance_name: "cm01"
          debug: true
      
      # - name: restart_cm_after_setup
      #   function: restart_appliance
      #   module: tasks.setup_appliances
      #   description: "Restart CM appliance after initial setup"
      #   args:
      #     appliance_name: "cm01"
      #     debug: true
      #     wait_for_availability: true
      #     wait_timeout: 600

