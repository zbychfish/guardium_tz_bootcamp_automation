# Groups Configuration
# Defines logical groups of stages that are executed together
# Groups are executed in the order they appear in this file

groups:
  initial_preparation:
    name: "Initial Preparation"
    description: "Basic system setup and database deployments before marker creation"
    auto_execute: true  # Executed automatically before marker
    dependencies: []  # No dependencies - this is the first group
    stages:
      - name: setup_hosts
        function: setup_hosts_task
        module: tasks.setup_hosts
        description: "Configure /etc/hosts, SSHD, and root password on all machines"
        
      - name: preparation_for_services_deployment
        function: preparation_for_services_deployment
        module: tasks.preparation_for_services_deployment
        description: "Update system packages, prepare upload content, and download supporting files"

  other_preparations:
    name: "Other general tasks, standard database installation"
    description: "Bootcamp machines preparation"
    auto_execute: true
    dependencies: [initial_preparation]  # Requires initial_preparation to be completed
    stages:
      - name: deploy_mysql_on_raptor
        function: deploy_mysql_on_raptor
        module: tasks.deploy_mysql
        description: "Deploy MySQL 9.7 on raptor"
      
      - name: deploy_mongo_on_raptor
        function: deploy_mongo_on_raptor
        module: tasks.deploy_mongo
        description: "Deploy MongoDB 8.3 on raptor with SSL/TLS"

      - name: deploy_postgres_on_raptor
        function: deploy_postgres_on_raptor
        module: tasks.deploy_postgres
        description: "Install postgres 16 on raptor"
      
      - name: setup_oracle_container_on_sauropod
        function: setup_oracle_container_on_sauropod
        module: tasks.deploy_oracle
        description: "Copy Oracle 21c container image from raptor to sauropod and load into podman"
        args:
          image_source_path: "/opt/guardium_tz_bootcamp_automation/upload/source_files/oracle/oracle_db_21c_image_with_oua.tar.gz"
          debug: false

      - name: deploy_oracle_on_sauropod
        function: deploy_oracle_on_sauropod
        module: tasks.deploy_oracle
        description: "Deploy Oracle 21c on sauropod"
      
      - name: deploy_db2_on_raptor
        function: deploy_db2_on_raptor
        module: tasks.deploy_db2
        description: "Install Db2 11.5 on raptor"
      
      - name: deploy_cassandra_on_sauropod
        function: deploy_cassandra_on_sauropod
        module: tasks.deploy_cassandra
        description: "Deploy Apache Cassandra 4.1 on sauropod"

  setup_appliances:
    name: "Setup Appliances"
    description: "Configure Guardium appliances (collector, CM, etc.)"
    auto_execute: true  # Executed on demand
    dependencies: [initial_preparation]  # Requires initial_preparation to be completed
    stages:
      - name: reset_cli_password_all
        function: reset_cli_password_all
        module: tasks.setup_appliances
        description: "Reset CLI password on all appliances using cloudsupport account and sudo (parallel execution)"
        args:
          # cloudsupport_password: "password"  # Optional - defaults to cloudsupport_pwd from custom_variables
          # cli_password: "password"  # Optional - defaults to cli_pwd from custom_variables
          debug: false
      
      - name: create_oauth_client
        function: create_oauth_client
        module: tasks.setup_appliances
        description: "Create OAuth client and save client_secret to .client_secret file"
        args:
          appliance_name: "cm"
          client_id: "BOOTCAMP"
           
      - name: create_demo_user
        function: create_demo_user
        module: tasks.setup_appliances
        description: "Create demo user in Guardium via REST API"
        args:
          appliance_name: "cm"  # Name from config/appliances.yaml
          
      - name: configure_system_settings_all
        function: configure_system_settings_all
        module: tasks.setup_appliances
        description: "CONSOLIDATED: Configure ALL system settings in single CLI session per appliance (hostname, domain, small_disk, timeouts, network IP, timezone, NTP, hosts resolving, product GID). Executes in parallel (max 20), CM → Collectors → AppNodes order."
        args:
          # hostname: "custom"  # Optional - override hostname for all appliances
          # domain: "demo.guardium"  # Optional - defaults to demo.guardium
          # ip_address: "10.240.64.9"  # Optional - uses IP from appliances.yaml if not provided
          # prefix: "/24"  # Optional - network prefix (default: /24)
          timezone: "Europe/London"  # Optional - defaults to Europe/Warsaw or from machines_info.json
          # ntp_servers: ['time.google.com', 'time.cloudflare.com']  # Optional - defaults to pool.ntp.org
          configure_hosts: true  # Optional - whether to configure /etc/hosts (default: true)
          # gid: 12345  # Optional - product GID, generates random 1000-100000 if not provided
          debug: false
      
      - name: set_shared_secret_all
        function: set_shared_secret_all
        module: tasks.setup_appliances
        description: "Set shared secret on all appliances (parallel execution). Uses 'shared_secret' from custom_variables, defaults to 'guardium' if not found."
        args:
          # shared_secret: "guardium"  # Optional - defaults to shared_secret from custom_variables or "guardium"
          debug: false
      
      - name: configure_aggregation_settings_all
        function: configure_aggr_settings_all
        module: tasks.setup_appliances
        description: "Configure aggregation settings on all appliances: run_cleanup_orphans_daily off, purge_age_period 0 (parallel execution)"
        args:
          debug: false

      - name: restart_all_appliances_after_initial_setup
        function: restart_appliance_all
        module: tasks.setup_appliances
        description: "Restart ALL appliances after initial setup (async with max 20 parallel)"
        args:
          debug: false
          wait_for_availability: true
          retry_interval: 15  # Seconds between retry attempts (default: 10)
          max_retries: 40  # Maximum retry attempts (default: 60, total timeout = 40 * 15 = 600s = 10min)

      - name: set_unit_type_manager
        function: set_unit_type_manager
        module: tasks.setup_appliances
        description: "Set unit type to manager via CLI"
        args:
          appliance_name: "cm"
          debug: false
      
      - name: register_appliances_on_cm
        function: register_appliances_all
        module: tasks.setup_appliances
        description: "Register all Collectors and AppNodes on Central Manager sequentially (one by one, 10 min timeout per appliance)"
        args:
          # cm_ip: "10.240.64.9"  # Optional - auto-detected from appliances.yaml
          cm_port: 8443
          timeout: 300  # 10 minutes per appliance
          registration_check_delay: 120  # Seconds to wait before checking status after timeout or "Fail:" (default: 120)
          debug: false

      - name: restart_all_appliances_after_managed_by_cm
        function: restart_appliance_all
        module: tasks.setup_appliances
        description: "Restart ALL appliances after initial setup (async with max 20 parallel)"
        args:
          debug: false
          wait_for_availability: true
          retry_interval: 15  # Seconds between retry attempts (default: 10)
          max_retries: 40  # Maximum retry attempts (default: 60, total timeout = 40 * 15 = 600s = 10min)
      
      - name: import_definitions_on_cm
        function: import_definitions_on_cm
        module: tasks.setup_appliances
        description: "Import definitions (default policy and full SQL report) to CM via REST API"
        args:
          cm_appliance: "cm"
          definitions_dir: "/opt/guardium_tz_bootcamp_automation/upload/source_files/exports/"
          debug: false

      - name: prepare_appliances_for_patching
        function: prepare_appliances_for_patching_all
        module: tasks.setup_appliances
        description: "Prepare ALL appliances for patching by copying *.sig files to /var/log/guard/patches/ (parallel execution, max 20)"
        args:
          patches_source_dir: "/opt/guardium_tz_bootcamp_automation/upload/source_files/appliances/patches/"
          # cloudsupport_password: "password"  # Optional - defaults to cloudsupport_pwd from machines_info.json
          debug: false

      - name: install_and_monitor_patches_all
        function: install_and_monitor_patches_all
        module: tasks.setup_appliances
        description: "Install and monitor patches on ALL appliances in parallel (max 20). Automatically gets patch order from CM if not specified."
        args:
          # patch_selection: "4,1,3"  # Optional - comma-separated positions. If not provided, will be determined from CM using patch_order.txt
          reinstall_answer: "y"  # Answer to reinstall question (default: "y")
          check_interval: 120  # Seconds between status checks (default: 60)
          max_checks: 60  # Maximum number of checks before timeout (default: 60 = 1 hour with 60s interval)
          debug: false
      
      - name: install_policy_on_collector
        function: install_policy_on_collector
        module: tasks.setup_appliances
        description: "Install policy on collector via REST API"
        args:
          cm_appliance: "cm"
          collector_appliance: "coll1"
          policy_name: "Default bootcamp policy"
          debug: false

  gim_lab:
    name: "GIM Lab"
    description: "Install GIM on raptor, import GIM modules, and install STAP agent"
    auto_execute: true  # Executed on demand
    dependencies: [initial_preparation, setup_appliances, other_preparations]  # Requires initial_preparation and setup_appliances
    stages:
     
      - name: import_gim_modules
        function: import_gim_modules
        module: tasks.labs
        description: "Import GIM module files to Guardium appliance"
        args:
          appliance_name: "cm"
          demo_user: "demo"
          gim_directory: "/opt/guardium_tz_bootcamp_automation/upload/source_files/agents/gim"
          gim_target_dir: "/var/dump"
          debug: false
      
  atap_lab:
    name: "ATAP Lab"
    description: "Bootcamp state after ATAP lab"
    auto_execute: false  # Executed after marker, on demand
    dependencies: [setup_appliances, gim_lab]  # Requires initial_preparation to be completed
    stages:
      
      - name: install_gim_on_raptor
        function: install_gim_on_raptor
        module: tasks.labs
        description: "Install GIM (Guardium Installation Manager) on raptor machine"
        args:
          gim_installer_path: "/opt/guardium_tz_bootcamp_automation/upload/source_files/agents/shell/guard-bundle-GIM-12.2.2.0_r123489_v12_x_1-rhel-9-linux-x86_64.gim.sh"
          install_dir: "/opt/guardium"
          # tapip: ""     # Optional - auto-detected from raptor config if not provided
          # sqlguardip: "" # Optional - auto-detected from cm config if not provided
          debug: false
    
      - name: install_stap_on_raptor
        function: install_stap_on_raptor
        module: tasks.labs
        description: "Install STAP (S-TAP) agent on raptor using GIM"
        args:
          appliance_name: "cm"
          collector_name: "coll1"
          module: "BUNDLE-STAP"
          module_version: "12.2.2.0_r123489_3"
          use_tls: "1"
          statistics: "-3"
          connection_pool_size: "2"
          debug: false

      - name: enable_atap_for_postgres_on_raptor
        function: enable_atap_for_postgres_on_raptor
        module: tasks.labs
        description: "Enable ATAP (Application Transparent Access Protection) for PostgreSQL on raptor"
        args:
          db_user: "postgres"
          db_home: "/usr"
          db_user_dir: "/var/lib/pgsql"
          db_type: "postgres"
          db_instance: "postgres"
          db_version: "16"

      - name: correct_mysql_ie
        function: correct_mysql_ie
        module: tasks.labs
        description: "Correct MySQL Inspection Engine definitions"
        args:
          cm_appliance: "cm"
          collector_appliance: "coll1"

      - name: enable_atap_for_mongo
        function: enable_atap_for_mongo
        module: tasks.labs
        description: "Enable ATAP for MongoDB on raptor"

      - name: import_atap_definitions
        function: import_atap_definitions
        module: tasks.labs
        description: "Import ATAP lab definitions to CM via REST API"
        args:
          cm_appliance: "cm"
          definitions_dir: "/opt/guardium_tz_bootcamp_automation/upload/source_files/exports/"
          debug: false

      # - name: current_test
      #   function: current_test
      #   module: tasks.current_test
      #   description: "TEST: Disable default accounts only (diagnostic)"
      #   args:
      #     appliance_name: "cm01"

  exit_lab:
    name: "Exit Lab"
    description: "Configure DB2 exit for Guardium monitoring"
    auto_execute: false  # Executed on demand
    dependencies: [atap_lab]
    stages:
      - name: configure_db2_exit
        function: db2_exit_configuration
        module: tasks.labs
        description: "Configure DB2 exit for Guardium monitoring on raptor"
      
      - name: configure_db2_exit_ie
        function: configure_db2_exit_ie
        module: tasks.labs
        description: "Configure DB2 Exit Inspection Engine on collector"
        args:
          cm_appliance: "cm"
          collector_appliance: "coll1"

  uc1_lab:
    name: "UC 1.0 lab"
    description: "Universal Connector 1.0 lab setup"
    auto_execute: false  # Executed on demand
    dependencies: [exit_lab]
    stages:
      - name: install_filebeat_on_sauropod
        function: install_filebeat_on_sauropod
        module: tasks.labs
        description: "Install and configure Filebeat on sauropod for Cassandra audit logs"
        args:
          rpms_dir: "/opt/guardium_tz_bootcamp_automation/upload/source_files/rpms"
          filebeat_pattern: "filebeat-*.rpm"
          debug: false

  etap_lab:
    name: "ETAP Lab"
    description: "Setup raptor for External TAP (ETAP) deployment"
    auto_execute: false  # Executed on demand
    dependencies: [exit_lab]
    stages:
      - name: setup_raptor_to_deploy_etap
        function: setup_raptor_to_deploy_etap
        module: tasks.labs
        description: "Install required packages and determine latest ETAP version for deployment"
        args:
          debug: false
      
      - name: setup_etap_certificates_mysql
        function: setup_etap_certificates_mysql
        module: tasks.labs
        description: "Create CA, generate CSR, sign certificate, and import ETAP certificates for MySQL to collector"
        args:
          collector_appliance: "coll1"
          ca_dir: "/opt/ETAP/ca"
          etap_alias: "mysql-etap"
          etap_common_name: "mysql-etap"
          etap_san1: "coll1.demo.com"
          etap_organizational_unit: "Demo"
          etap_organization: "Guardium"
          etap_locality: "Nowa Sol"
          etap_state: "Lubuskie"
          etap_country: "PL"
          etap_email: "guardadmin@gmail.com"
          etap_encryption_algorithm: "2"
          etap_keysize: "2"
          etap_san2: ""
          ca_common_name: "ETAP CA"
          ca_alias: "etapca"

      - name: deploy_etap_mysql
        function: deploy_etap_mysql
        module: tasks.labs
        description: "Temporarily add SSH port 22 on raptor, restart sshd, clone Guardium External S-TAP repository, and run ETAP MySQL deployment"
        args:
          collector_appliance: "coll1"
          debug: false

  oracle_lab:
    name: "Oracle Lab"
    description: "Install GIM and STAP on sauropod for Oracle monitoring"
    auto_execute: false
    dependencies: [etap_lab]
    stages:
      - name: install_stap_on_sauropod
        function: install_stap_on_sauropod
        module: tasks.labs
        description: "Create /opt/lab_files, copy and install GIM on sauropod, then install STAP via API"
        args:
          appliance_name: "cm"
          collector_name: "coll1"
          gim_installer_filename: "guard-bundle-GIM-12.2.2.0_r123489_v12_x_1-rhel-8-linux-x86_64.gim.sh"
          module: "BUNDLE-STAP"
          module_version: "12.2.2.0_r123489_11"
          debug: false

      - name: enable_atap_for_oracle
        function: enable_atap_for_oracle
        module: tasks.labs
        description: "Enable ATAP for Oracle on sauropod"
        args:
          debug: false

      - name: deploy_etap_for_oracle
        function: deploy_etap_for_oracle_container_on_sauropod
        module: tasks.labs
        description: "Generate CSR for Oracle ETAP, sign with existing CA, import certificate to collector"
        args:
          collector_appliance: "coll1"
          ca_dir: "/opt/ETAP/ca"
          etap_alias: "oracle-etap"
          etap_common_name: "oracle-etap"
          etap_san1: "coll1.demo.com"
          etap_organizational_unit: "Demo"
          etap_organization: "Guardium"
          etap_locality: "Nowa Sol"
          etap_state: "Lubuskie"
          etap_country: "PL"
          etap_email: "guardadmin@gmail.com"
          etap_encryption_algorithm: "2"
          etap_keysize: "2"
          etap_san2: ""
          ca_alias: "etapca"

      - name: setup_stap_with_oua_on_sauropod
        function: setup_stap_with_oua_on_sauropod
        module: tasks.labs
        description: "Configure Oracle OUA: create secadmin/guardium users, guard_tap.ini, store SQL credentials and SQL configuration on collector"
        args:
          appliance_name: "cm"
          collector_name: "coll1"
          instantclient_rpm: "oracle-instantclient-basic-21.1.0.0.0-1.x86_64.rpm"
          instantclient_source_dir: "/opt/guardium_tz_bootcamp_automation/upload/source_files/oracle"
          debug: false

      - name: setup_oua_audit_policy_on_sauropod
        function: setup_oua_audit_policy_on_sauropod
        module: tasks.labs
        description: "Create GAME_APP audit policy and scheduler job as secadmin in Oracle on sauropod"
        args:
          debug: false

      - name: import_oracle_dashboard
        function: import_oracle_dashboard
        module: tasks.labs
        description: "Import Oracle dashboard (exp_dashboard_oracle.sql) to CM via REST API"
        args:
          cm_appliance: "cm"
          definitions_dir: "/opt/guardium_tz_bootcamp_automation/upload/source_files/exports/"
          debug: false

  oracle_lab_uc2:
    name: "Oracle Lab UC2"
    description: "Deploy Universal Connector 2.0 for Oracle container on sauropod"
    auto_execute: false
    dependencies: [oracle_lab]
    stages:
      - name: run_uc_and_setup_kafka_node
        function: run_uc_and_setup_kafka_node
        module: tasks.labs
        description: "Run Universal Connector on coll1 and setup kafka-node on kafka1"
        args:
          collector_appliance: "coll1"
          kafka_appliance: "kafka1"
          debug: true

      - name: register_kafka_cluster
        function: register_kafka_cluster
        module: tasks.labs
        description: "Register Kafka cluster via REST API"
        args:
          cm_appliance: "cm"
          cluster_name: "kafka_cluster_1"
          member_list: "kafka1.demo.guardium"
          apply_cruise_control: false
          debug: true

      - name: start_kafka_nodes
        function: start_kafka_nodes
        module: tasks.labs
        description: "Start kafka nodes on cluster, wait 60s before and 5min after (async command)"
        args:
          cm_appliance: "cm"
          cluster_name: "kafka_cluster_1"
          member_list: "kafka1.demo.guardium"
          debug: true

      - name: create_uc_credential
        function: create_uc_credential_for_oracle_container
        module: tasks.labs
        description: "Create UC credential oracle_container_sauropod"
        args:
          cm_appliance: "cm"
          credential_name: "oracle_container_sauropod"
          credential_type: "JDBC Credentials"
          cred_username: "guardium"
          debug: true

      - name: import_uc_profile
        function: import_uc_profile_oracle_container
        module: tasks.labs
        description: "Import UC profile from oracle_21_container_sauropod.csv"
        args:
          cm_appliance: "cm"
          csv_path: "/opt/guardium_tz_bootcamp_automation/upload/source_files/oracle/oracle_21_container_sauropod.csv"
          jar_file: "/opt/guardium_tz_bootcamp_automation/upload/source_files/oracle/ojdbc8.jar"
          update_mode: false
          test_connections: true
          debug: true

      - name: bulk_install_uc_profile
        function: bulk_install_uc_profile
        module: tasks.labs
        description: "Install UC profile on coll1 via universal_connector_bulk_install"
        args:
          cm_appliance: "cm"
          profile_names: "oracle_21_container_sauropod"
          bulk_install_hosts: "coll1.demo.guardium"
          debug: true

  ltr_lab:
    name: "LTR Lab"
    description: "Prepare raptor for LTR tasks based on guardium_notes_dbtraffic"
    auto_execute: false
    dependencies: [etap_lab]
    stages:
      - name: setup_minio_on_raptor
        function: setup_minio_on_raptor
        module: tasks.labs
        description: "Prepare MinIO certificate authority, trust chain, private key, and CSR on raptor"
      
      - name: setup_appnode
        function: setup_appnode
        module: tasks.labs
        description: "Setup app-node on appliance by executing 'store unit type app-node', wait for reboot and reconnection"
        args:
          appliance_name: "appnode1"
          debug: false
          retry_interval: 60
          max_retries: 10
      
      - name: prepare_appnode_for_patching
        function: copy_single_file_to_appliance_task
        module: tasks.setup_appliances
        description: "Copy datalake patch file to appnode1 for installation"
        args:
          appliance_name: "appnode1"
          source_file_path: "/opt/guardium_tz_bootcamp_automation/upload/source_files/appliances/extensions/SqlGuard-12.0p80111_datalake_May_15_2026.tgz.enc.sig"
          target_dir: "/var/IBM/Guardium/log/patches/"
          owner: "tomcat:tomcat"
          debug: false
      
      - name: install_patch_on_appnode
        function: install_patch_on_appliance_single
        module: tasks.setup_appliances
        description: "Install datalake patch on appnode1"
        args:
          appliance_name: "appnode1"
          patch_selection: "1"
          reinstall_answer: "y"
          debug: false
      
      - name: enable_ltr_on_appnode
        function: enable_ltr_on_appnode
        module: tasks.labs
        description: "Enable LTR (Lake Threat Response) on appnode1 - install, configure, start datalake and verify status"
        args:
          appliance_name: "appnode1"
          debug: false
      
      - name: import_minio_CA_certificate
        function: import_minio_CA_certificate
        module: tasks.labs
        description: "Import MinIO S3 certificate to CM for datalake integration"
        args:
          appliance_name: "cm"
          certificate_file_path: "/home/minio/ca/certs/ca.crt"
          debug: false
      
      - name: distribute_minio_certificate
        function: distribute_minio_certificate
        module: tasks.labs
        description: "Distribute datalake certificate to all managed appliances (appnodes and collectors)"
        args:
          appliance_name: "cm"
          timeout: 600
          check_interval: 10
          debug: false
      
      - name: activate_ltr
        function: activate_ltr
        module: tasks.labs
        description: "Activate LTR (Long Term Retention) by configuring complete cold storage on CM with MinIO S3 backend"
        args:
          appliance_name: "cm"
          debug: false
      
      - name: import_ltr_dashboard
        function: import_ltr_dashboard
        module: tasks.labs
        description: "Import LTR dashboard (exp_dashboard_ltr.sql) to CM via REST API"
        args:
          cm_appliance: "cm"
          definitions_dir: "/opt/guardium_tz_bootcamp_automation/upload/source_files/exports/"
          debug: false

  informix_lab:
    name: "Informix Lab"
    description: "Configure sauropod for IBM Informix monitoring"
    auto_execute: false
    dependencies: [setup_appliances]
    stages:
      - name: configure_kernel_parameters
        function: configure_kernel_parameters
        module: tasks.deploy_informix_new
        description: "Write /etc/sysctl.d/99-informix.conf, apply kernel parameters, add informix user limits on sauropod"

      - name: create_informix_user
        function: create_informix_user
        module: tasks.deploy_informix_new
        description: "Create informix group (gid 200), user (uid 200) and set password on sauropod"

      - name: install_informix_binaries
        function: install_informix_binaries
        module: tasks.deploy_informix_new
        description: "Upload installer, extract, write response.properties and run silent installer on sauropod"
        args:
          installer_filename: "ibm.server.15.0.1.0.Linux.64.x86_64.tar"
          installer_source_dir: "/opt/guardium_tz_bootcamp_automation/upload/source_files/informix"
          install_tmp_dir: "/opt/informix_tmp"
          install_dir: "/opt/ibm/informix"

      - name: configure_informix_bash_profile
        function: configure_informix_bash_profile
        module: tasks.deploy_informix_new
        description: "Configure /home/informix/.bash_profile with Informix environment variables"
        args:
          install_dir: "/opt/ibm/informix"
          informix_server: "ifxserver"

      - name: configure_informix_onconfig
        function: configure_informix_onconfig
        module: tasks.deploy_informix_new
        description: "Copy onconfig.std and apply sed substitutions for ifxserver instance"
        args:
          install_dir: "/opt/ibm/informix"
          informix_server: "ifxserver"
