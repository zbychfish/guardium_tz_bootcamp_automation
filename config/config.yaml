# Machine Automation Framework Configuration
# This is an example configuration file showing available options

# General settings
general:
  project_name: "Machine Automation"
  environment: "development"  # development, staging, production
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  raptor_kernel: "5.14.0-570.114.1.el9_6.x86_64"

# SSH connection defaults
ssh:
  port: 2223
  timeout: 30
  username: "root"
  # password: ""  # Can be set via SSH_PASSWORD env var
  # key_file: ""  # Can be set via SSH_KEY_FILE env var

# NOTE: Machines are automatically loaded from /root/machines_info.json
# No need to define them here manually

# Task execution settings
execution:
  stop_on_error: true
  parallel_execution: false
  max_retries: 3
  retry_delay: 5  # seconds

# Paths
paths:
  state_file: "state.json"
  log_dir: "logs"
  temp_dir: "/tmp/automation"

# Task configuration
tasks:
  # List of remote machines to configure /etc/hosts on
  # These names must match base machine names from machines_info.json
  # Appliances (cm, appnodeX, collX) are automatically excluded
  remote_machines:
    - sauropod
    - ceratops
    - raptor
    - cm
    - coll1
    - appnode1

# Custom settings
# Add your own configuration sections here
custom:
  # Example custom settings
  database:
    type: "postgresql"
    port: 5432
  
  application:
    version: "1.0.0"
    port: 8080

