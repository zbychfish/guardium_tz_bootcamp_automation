# Appliance type definitions with default prompts
# Prompts support both formats: "name>" and "name.demo.guardium>"
appliance_types:
  collector:
    default_user: "cli"
    default_prompt_unconfigured: "[\\w-]+(\\.demo\\.guardium)?>"
    default_prompt_configured: "[\\w-]+(\\.demo\\.guardium)?>"
    description: "Guardium Data Collector"
  
  cm:
    default_user: "cli"
    default_prompt: "[\\w-]+(\\.demo\\.guardium)?>"
    description: "Central Manager"
  
  aggregator:
    default_user: "cli"
    default_prompt: "[\\w-]+(\\.demo\\.guardium)?>"
    description: "Aggregator"
  
  appnode:
    default_user: "cli"
    default_prompt: "[\\w-]+(\\.demo\\.guardium)?>"
    description: "Application Node"

