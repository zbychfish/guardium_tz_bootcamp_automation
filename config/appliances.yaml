# Guardium Appliances Configuration
# Define available appliances with their basic information
# Credentials (user/password) are provided separately via environment variables or parameters

appliances:
  coll1-suffix:
    ip: "10.240.0.14"
    type: "collector"
    description: "Primary Guardium Collector"
  
  cm-suffix:
    ip: "10.240.0.13"
    type: "cm"
    description: "Central Manager"
    port: 22
   
  appnode1-suffix:
    ip: "10.240.0.15"
    type: "appnode"
    description: "Application Node"

# Appliance type definitions with default prompts
# Prompts support both formats: "name>" and "name.demo.guardium>"
appliance_types:
  collector:
    default_user: "cli"
    default_prompt_unconfigured: "[\\w-]+(\\.demo\\.guardium)?>"
    default_prompt_configured: "[\\w-]+(\\.demo\\.guardium)?>"
    description: "Guardium Data Collector"
  
  cm:
    default_user: "cli"
    default_prompt: "[\\w-]+(\\.demo\\.guardium)?>"
    description: "Central Manager"
  
  aggregator:
    default_user: "cli"
    default_prompt: "[\\w-]+(\\.demo\\.guardium)?>"
    description: "Aggregator"
  
  appnode:
    default_user: "cli"
    default_prompt: "[\\w-]+(\\.demo\\.guardium)?>"
    description: "Application Node"

